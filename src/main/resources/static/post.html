<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - 我的博客</title>
  <!-- 固定浅色模式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="max-w-6xl mx-auto px-4 h-full flex items-center justify-between">
      <a href="/" class="text-xl font-bold gradient-text no-underline">MyBlog</a>
      <nav class="hidden md:flex items-center gap-1">
        <a href="/" class="nav-link"><i class="fas fa-home mr-1"></i>首页</a>
        <a href="/news-list.html" class="nav-link"><i class="fas fa-newspaper mr-1"></i>新闻</a>
        <a href="/about.html" class="nav-link"><i class="fas fa-user mr-1"></i>关于</a>
        <a href="/admin/posts.html" class="nav-link"><i class="fas fa-cog mr-1"></i>管理</a>
      </nav>
      <div class="flex items-center gap-3">
        <button class="mobile-menu-btn md:hidden text-xl p-2"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="/"><i class="fas fa-home mr-2"></i>首页</a>
    <a href="/news-list.html"><i class="fas fa-newspaper mr-2"></i>新闻</a>
    <a href="/about.html"><i class="fas fa-user mr-2"></i>关于</a>
    <a href="/admin/posts.html"><i class="fas fa-cog mr-2"></i>管理</a>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <div id="loadingState" class="flex justify-center py-20"><div class="spinner"></div></div>

    <div id="errorState" class="hidden text-center py-20">
      <i class="fas fa-exclamation-circle text-4xl text-red-400 mb-4"></i>
      <p class="text-gray-500">文章不存在或已被删除</p>
      <a href="/" class="inline-block mt-4 text-blue-500 hover:underline">返回首页</a>
    </div>

    <div id="postContent" class="hidden">
      <div class="mb-6">
        <a href="/" class="text-sm text-blue-500 hover:underline mb-4 inline-block">
          <i class="fas fa-arrow-left mr-1"></i> 返回首页
        </a>
        <h1 class="text-3xl md:text-4xl font-bold mt-2 mb-4" id="postTitle"></h1>
        <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
          <span><i class="far fa-calendar-alt mr-1"></i> <span id="postDate"></span></span>
          <span><i class="far fa-folder mr-1"></i> <span id="postCategory"></span></span>
          <span><i class="far fa-eye mr-1"></i> <span id="postViews"></span> 阅读</span>
          <span id="postTags"></span>
        </div>
      </div>

      <div class="flex gap-8">
        <article class="flex-1 min-w-0">
          <div class="card p-6 md:p-8">
            <div id="postCover" class="hidden mb-6">
              <img id="postCoverImg" class="w-full rounded-lg max-h-96 object-cover" alt="封面图">
            </div>
            <div class="article-content" id="articleBody"></div>
          </div>

          <div class="flex flex-col sm:flex-row justify-between gap-4 mt-6">
            <a id="prevPost" class="flex-1 card p-4 hover:shadow-md transition no-underline text-gray-700 dark:text-gray-300 hidden">
              <span class="text-xs text-gray-400"><i class="fas fa-chevron-left mr-1"></i> 上一篇</span>
              <span class="text-sm font-medium mt-1 block truncate" id="prevTitle"></span>
            </a>
            <a id="nextPost" class="flex-1 card p-4 hover:shadow-md transition no-underline text-right text-gray-700 dark:text-gray-300 hidden">
              <span class="text-xs text-gray-400">下一篇 <i class="fas fa-chevron-right ml-1"></i></span>
              <span class="text-sm font-medium mt-1 block truncate" id="nextTitle"></span>
            </a>
          </div>
        </article>

        <aside class="hidden lg:block w-56 shrink-0">
          <div class="toc-sidebar">
            <div class="card p-4">
              <h4 class="text-sm font-bold mb-2 text-gray-500 uppercase tracking-wider">目录</h4>
              <div id="tocContainer"></div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="max-w-6xl mx-auto px-4">
      <p>&copy; 2024 MyBlog. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      initMobileMenu();
      loadPostDetail();
    });
  </script>
</body>
</html>
